<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Data Entry</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h2>
      Welcome To Your Tab System
    </h2>
    <form action="">
      <fieldset>
        <legend>
          Team Data Entry Form
        </legend>

        <table border="1">
          <tr>
            <th>
              Team Name
            </th>
            <td colspan="3">
              <input type="text" placeholder="Enter Team name here" style="width: 98%;" required>
            </td>
          </tr>
          <tr>
            <th rowspan="3">
              Team Speakers
            </th>

            <td>
              <input type="text" placeholder="Speaker 1" required>
            </td>
            <td>
              <input type="radio" name="gender1"> Male
            </td>
            <td>
              <input type="radio" name="gender1"> Female
            </td>

          </tr>

          <tr>
            <td>
              <input type="text" placeholder="Speaker 2" required>
            </td>

            <td>
              <input type="radio" name="gender2"> Male
            </td>
            <td>
              <input type="radio" name="gender2"> Female
            </td>


          </tr>

          <tr>
            <td>
              <input type="text" placeholder="Speaker 3" required>
            </td>

            <td>
              <input type="radio" name="gender3"> Male
            </td>
            <td>
              <input type="radio" name="gender3"> Female
            </td>
          </tr>
        </table> <br>

        <div class="buttons">
          <button class="submit-button">
            Submit
          </button>

          <button class="finish-button">
            Finish
          </button>
        </div>
      </fieldset>
    </form>
  </div>
  <script src="functionality.js"></script>
</body>

</html>
