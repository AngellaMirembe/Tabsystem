<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Data Entry</title>

  <style>

    button {
      padding-left: 8px;
      padding-right: 8px;
      padding-top: 5px;
      padding-bottom: 5px;
      border: none;
      background-color: green;
      color: white;
      border-radius: 15px;
    }

    fieldset {
      border-color: green;
      border-radius: 10px;
      display: inline-block;
      border-style: solid;
      color: green;
    }

    table{
      background-color: green;
      color: white;
    }

    .buttons{
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    
    h2 {
      color: green;
      font-family: Arial, Helvetica, sans-serif;
    }

    
    .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border: solid;
            border-width: 2px;
            border-color: green;
            border-radius: 20px;
            padding: 15px;
            
        }
  

    
  </style>
</head>

<body>
<div class="container">
  <h2>
    Welcome To Your Tab System
  </h2>
  <form action="">
    <fieldset>
      <legend>
        Team Data Entry Form
      </legend>
    
    <table border="1">
      <tr>
        <th>
          Team Name
        </th>
        <td colspan="3">
          <input type="text" placeholder="Enter Team name here" style="width: 98%;">
        </td>
      </tr>
      <tr>
        <th rowspan="3">
          Team Speakers
        </th>

        <td>
          <input type="text" placeholder="Speaker 1">
        </td>
        <td>
          <input type="radio" name="gender1"> Male
        </td>
        <td>
          <input type="radio" name="gender1"> Female
        </td>

      </tr>

      <tr>
        <td>
          <input type="text" placeholder="Speaker 2">
        </td>

        <td>
          <input type="radio" name="gender2"> Male
        </td>
        <td>
          <input type="radio" name="gender2"> Female
        </td>


      </tr>

      <tr>
        <td>
          <input type="text" placeholder="Speaker 3">
        </td>

        <td>
          <input type="radio" name="gender3"> Male
        </td>
        <td>
          <input type="radio" name="gender3"> Female
        </td>
      </tr>
    </table> <br>
    
    <div class="buttons">
    <button class="submit-button">
      Submit
    </button>

    <button class="finish-button">
      Finish
    </button>
    </div>
    </fieldset>
  </form>
</div>
  <script></script>
</body>

</html>
