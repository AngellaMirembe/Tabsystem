<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Data Entry</title>

  <style>
    th {
      
    }

    button {
      padding-left: 5px;
      padding-right: 5px;
      padding-top: 3px;
      padding-bottom: 3px;
      border: none;
      background-color: green;
      color: white;
      border-radius: 15px;
    }

    fieldset {
      border-color: green;
      border-radius: 5px;
      display: inline-block;
    }

    table{
      background-color: green;
      color: white;
    }

    .finish-button {
      margin-left: 76%;
    }
    
  </style>
</head>

<body>
  <form action="">
    <fieldset>
      <legend>
        Team Data Entry Form
      </legend>
    
    <table border="1">
      <tr>
        <th>
          Team Name
        </th>
        <td colspan="3">
          <input type="text" placeholder="Enter Team name here" style="width: 98%;">
        </td>
      </tr>
      <tr>
        <th rowspan="3">
          Team Speakers
        </th>

        <td>
          <input type="text" placeholder="Speaker 1">
        </td>
        <td>
          <input type="radio" name="gender1"> Male
        </td>
        <td>
          <input type="radio" name="gender1"> Female
        </td>

      </tr>

      <tr>
        <td>
          <input type="text" placeholder="Speaker 2">
        </td>

        <td>
          <input type="radio" name="gender2"> Male
        </td>
        <td>
          <input type="radio" name="gender2"> Female
        </td>


      </tr>

      <tr>
        <td>
          <input type="text" placeholder="Speaker 3">
        </td>

        <td>
          <input type="radio" name="gender3"> Male
        </td>
        <td>
          <input type="radio" name="gender3"> Female
        </td>
      </tr>
    </table> <br>

    <button class="submit-button">
      Submit
    </button>

    <button class="finish-button">
      Finish
    </button>
    </fieldset>
  </form>

  <script></script>
</body>

</html>
