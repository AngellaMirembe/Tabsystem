<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Data Entry</title>
</head>
<body>
  <form action="">
    <table border="1">
      <tr>
        <th>
          Team Name
        </th>
        <td colspan="3">
          <input type="text" placeholder="Enter Team name here">
        </td>
      </tr>
      <tr>
        <th>
          Team Speakers
        </th>
        
        <td>
          <input type="text" placeholder="Seaker 1">
        </td>

        <td>
          <input type="text" placeholder="Seaker 2">
        </td>

        <td>
          <input type="text" placeholder="Seaker 3">
        </td>
      </tr>
    </table> <br>

    <button>
      Submit
    </button>
  </form>
</body>
</html>
