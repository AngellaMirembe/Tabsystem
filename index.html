<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Data Entry</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h2>
      Welcome To Your Tab System
    </h2>
    <form action="" id="teamForm" autocomplete="off">
      <fieldset>
        <legend>
          Team Data Entry Form
        </legend>

        <table border="1">
          <tr>
            <th>
              Team Name
            </th>
            <td colspan="3">
              <input type="text" placeholder="Enter Team name here" style="width: 98%;" required id="teamName">
            </td>
          </tr>
          <tr>
            <th rowspan="3">
              Team Speakers
            </th>

            <td>
              <input type="text" placeholder="Speaker 1" required id="speaker1">
            </td>
            <td>
              <input type="radio" name="gender1" required value="Male"> Male
            </td>
            <td>
              <input type="radio" name="gender1" value="Female"> Female
            </td>

          </tr>

          <tr>
            <td>
              <input type="text" placeholder="Speaker 2" required id="speaker2">
            </td>

            <td>
              <input type="radio" name="gender2" required value="Male"> Male
            <td>
              <input type="radio" name="gender2" value="Female"> Female
            </td>


          </tr>

          <tr>
            <td>
              <input type="text" placeholder="Speaker 3" required id="speaker3">
            </td>

            <td>
              <input type="radio" name="gender3" required value="Male"> Male
            </td>
            <td>
              <input type="radio" name="gender3" value="Female"> Female
            </td>
          </tr>
        </table> <br>

        <div class="buttons" type="submit">
          <button class="submit-button">
            Submit
          </button>

          <button class="finish-button" id="finishButton">
            Finish
          </button>
        </div>
        <div id="output"></div>
      </fieldset>
    </form>
  </div>
  <script src="functionality.js"></script>
</body>

</html>
